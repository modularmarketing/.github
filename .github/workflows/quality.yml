# Reusable quality workflow for all modularmarketing products/ repos
# Called via: uses: modularmarketing/.github/.github/workflows/quality.yml@main
name: Quality

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '22'
        description: 'Node.js version (default: 22 LTS)'
      package-manager:
        type: string
        default: 'npm'
        description: 'Package manager: npm or bun'
      base-url:
        type: string
        description: 'Vercel preview URL for E2E tests. Leave empty to skip E2E.'
        default: ''
      browser-mode:
        type: string
        description: 'chromium (fast, PRs) or all (thorough, main merges)'
        default: 'chromium'

permissions: read-all

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'npm' && 'npm ci' || 'bun install --frozen-lockfile' }}
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: ${{ inputs.package-manager == 'npm' && 'npx eslint . --cache --cache-location .eslintcache' || 'bunx eslint . --cache --cache-location .eslintcache' }}
      - name: Build
        run: ${{ inputs.package-manager == 'npm' && 'npm run build' || 'bun run build' }}

  test:
    name: test
    runs-on: ubuntu-latest
    needs: quality
    permissions: read-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'npm' && 'npm ci' || 'bun install --frozen-lockfile' }}
      - name: Run unit tests
        run: ${{ inputs.package-manager == 'npm' && 'npm test' || 'bun test' }}

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ inputs.base-url != '' }}
    permissions: read-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install dependencies
        run: ${{ inputs.package-manager == 'npm' && 'npm ci' || 'bun install --frozen-lockfile' }}
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}
      - name: Install Playwright browsers (fresh)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Install all browsers for full run
        if: ${{ inputs.browser-mode == 'all' }}
        run: npx playwright install firefox webkit --with-deps
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          BASE_URL: ${{ inputs.base-url }}
          FULL_BROWSERS: ${{ inputs.browser-mode == 'all' && 'true' || '' }}
